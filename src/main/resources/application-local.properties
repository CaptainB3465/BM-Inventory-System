# =============================================================
# LOCAL DEVELOPMENT PROFILE
# Activated with: --spring.profiles.active=local
# Or set env var: SPRING_PROFILES_ACTIVE=local
# =============================================================
spring.datasource.url=jdbc:h2:mem:inventorydb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Web Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key-for-local}
