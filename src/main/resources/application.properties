spring.application.name=inventory

# =============================================================
# SERVER
# =============================================================
server.port=${PORT:8080}

# =============================================================
# DATABASE — PostgreSQL via Railway DATABASE_URL
# =============================================================
# Railway automatically injects DATABASE_URL into ALL services
# that are connected to the PostgreSQL plugin.
# Format: postgresql://user:password@host:port/database
# We convert it to the JDBC format Spring Boot expects.
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (Railway free tier: keep pool small)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================================
# JPA / HIBERNATE
# =============================================================
spring.jpa.hibernate.ddl-auto=update
# Explicitly set dialect so Hibernate never needs to auto-detect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# =============================================================
# OPENAI
# =============================================================
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key}
spring.ai.openai.chat.options.model=gpt-3.5-turbo
spring.ai.retry.max-attempts=1