spring.application.name=inventory

# =============================================================
# SERVER
# =============================================================
server.port=${PORT:8080}

# =============================================================
# DATABASE — PostgreSQL via Railway
# =============================================================
# Railway provides the DATABASE_URL in postgres:// format.
# The PostgreSQL JDBC driver requires the jdbc:postgresql:// prefix.
# We also supply username & password explicitly so HikariCP can
# authenticate regardless of how credentials are embedded in the URL.
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================================
# JPA / HIBERNATE
# =============================================================
# update = create tables if missing, alter if schema changed
spring.jpa.hibernate.ddl-auto=update
# Explicitly set dialect — prevents Hibernate needing a live
# connection before it can determine the database type
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# Ensures DDL runs AFTER the datasource is fully initialised
spring.jpa.defer-datasource-initialization=true

# =============================================================
# OPENAI
# =============================================================
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key}
spring.ai.openai.chat.options.model=gpt-3.5-turbo
spring.ai.retry.max-attempts=1